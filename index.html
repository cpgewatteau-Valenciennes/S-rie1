<html>
<head>
    <meta charset="UTF-8">
    <title>Exercices de Latin</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&display=swap');

        body {
            font-family: "Crimson Text", serif;
            background-color: #f4f1ea;
            color: #2c2c2c;
            margin: 0;
            line-height: 1.6;
        }

        /* Bandeau romain */
        .bandeau-romain {
            background: #7b1f1f;
            color: #f4f1ea;
            padding: 18px 0;
            text-align: center;
            letter-spacing: 3px;
            font-size: 1.4em;
            text-transform: uppercase;
            border-bottom: 4px solid #d6d2c4;
        }

        h1 {
            text-align: center;
            font-size: 2.4em;
            letter-spacing: 2px;
            color: #7b1f1f;
            border-bottom: 3px solid #7b1f1f;
            padding-bottom: 10px;
            margin: 30px auto;
            text-transform: uppercase;
            max-width: 750px;
        }

        .menu {
            max-width: 750px;
            margin: 20px auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #d6d2c4;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .menu a {
            display: block;
            padding: 12px;
            margin: 10px 0;
            background: #7b1f1f;
            color: #f4f1ea;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1.2em;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu a:hover {
            background: #5e1616;
        }
    </style>
</head>

<body>

    <div class="bandeau-romain">Exercices de Latin – Roma Aeterna</div>

    </div>

</body>
</html>
